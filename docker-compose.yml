version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valuai-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:80
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - valuai

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: valuai-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - valuai

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: valuai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - valuai

volumes:
  redis_data:

networks:
  valuai:
    driver: bridge
